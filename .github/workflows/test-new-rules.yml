name: Test New Rule

on:
  push:
    paths:
      - 'src/main/java/org/qed/Generated/RRuleInstances/**/*.java'
  pull_request:
    paths:
      - 'src/main/java/org/qed/Generated/RRuleInstances/**/*.java'

jobs:
  # First job: detect which files changed
  get-changed-files:
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.changed-files.outputs.all_changed_files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            src/main/java/org/qed/Generated/RRuleInstances/**/*.java
          separator: ','

  # Second job: test the changed rules
  test-rules:
    needs: get-changed-files
    if: ${{ needs.get-changed-files.outputs.changed_files != '' }}
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      - name: Build parser project
        run: mvn -B compile --file pom.xml
      
      - name: Generate JSON for new/modified rules
        run: |
          mkdir -p rules
          
          # Create JSON generator
          cat > JsonGenerator.java << 'EOF'
          import org.qed.*;
          import com.fasterxml.jackson.databind.ObjectMapper;
          import java.nio.file.*;
          
          public class JsonGenerator {
              public static void main(String[] args) throws Exception {
                  if (args.length == 0) {
                      System.err.println("Usage: java JsonGenerator <className>");
                      System.exit(1);
                  }
                  
                  String className = args[0];
                  try {
                      Class<?> clazz = Class.forName(className);
                      RRule rule = (RRule) clazz.getDeclaredConstructor().newInstance();
                      
                      ObjectMapper mapper = new ObjectMapper();
                      Files.createDirectories(Path.of("rules"));
                      String fileName = rule.name() + "-" + rule.info() + ".json";
                      mapper.writerWithDefaultPrettyPrinter().writeValue(
                          Path.of("rules", fileName).toFile(),
                          rule.toJson()
                      );
                      System.out.println("Generated: " + fileName);
                  } catch (Exception e) {
                      System.err.println("Failed to generate JSON for " + className);
                      e.printStackTrace();
                      System.exit(1);
                  }
              }
          }
          EOF
          
          # Get classpath
          CLASSPATH="target/classes:$(mvn dependency:build-classpath -q -DforceStdout)"
          
          # Compile generator
          javac -cp "$CLASSPATH" JsonGenerator.java
          
          # Process each changed file
          IFS=',' read -ra FILES <<< "${{ needs.get-changed-files.outputs.changed_files }}"
          for file in "${FILES[@]}"; do
            if [ -n "$file" ]; then
              className=$(echo "$file" | sed 's|src/main/java/||; s|/|.|g; s|\.java$||')
              echo "Processing: $className"
              java -cp ".:$CLASSPATH" JsonGenerator "$className"
            fi
          done
          
          rm -f JsonGenerator.java JsonGenerator.class
      
      - name: Setup qed-prover
        run: |
          # Option 1: Try to checkout qed-prover (update URL if needed)
          # git clone https://github.com/qed-solver/prover.git || {
          #   echo "::error::Cannot clone qed-prover repository"
          #   echo "Please update the repository URL in the workflow"
          #   exit 1
          # }
          
          # Option 2: For testing, create a mock qed-prover
          echo "::warning::Using mock qed-prover for testing. Replace with real qed-prover!"
          mkdir -p qed-prover/target/release
          
          cat > qed-prover/target/release/qed-prover << 'EOF'
          #!/bin/bash
          # MOCK qed-prover - Replace with real implementation
          json_file="$1"
          rule_name=$(basename "$json_file" .json)
          
          # Mock: all rules pass for testing
          echo '{"provable":true,"panicked":false,"complete_fragment":false,"equiv_class_duration":{"secs":0,"nanos":20638791},"equiv_class_timed_out":false,"smt_duration":{"secs":0,"nanos":55148417},"smt_timed_out":false,"nontrivial_perms":false,"translate_duration":{"secs":0,"nanos":1047250},"normal_duration":{"secs":0,"nanos":1880834},"stable_duration":{"secs":0,"nanos":28722792},"unify_duration":{"secs":0,"nanos":55404417},"total_duration":{"secs":0,"nanos":129852459}}'
          EOF
          
          chmod +x qed-prover/target/release/qed-prover
      
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      
      - name: Test rules with qed-prover
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          failed_rules=""
          passed_rules=""
          
          # Test the generated JSON files
          for json_file in rules/*.json; do
            if [ -f "$json_file" ]; then
              rule_name=$(basename "$json_file" .json)
              echo "Testing rule: $rule_name"
              
              # Run qed-prover
              output=$(./qed-prover/target/release/qed-prover "$json_file" 2>&1)
              
              # Parse result
              if echo "$output" | jq -e '.provable == true' > /dev/null 2>&1; then
                echo "✅ $rule_name: PASSED" | tee -a $GITHUB_STEP_SUMMARY
                passed_rules="$passed_rules$rule_name,"
              else
                echo "❌ $rule_name: FAILED" | tee -a $GITHUB_STEP_SUMMARY
                failed_rules="$failed_rules$rule_name,"
              fi
            fi
          done
          
          # Set outputs for use in other steps/jobs
          echo "failed_rules=$failed_rules" >> $GITHUB_OUTPUT
          echo "passed_rules=$passed_rules" >> $GITHUB_OUTPUT
          
          # Fail if any rules failed
          if [ -n "$failed_rules" ]; then
            echo "::error::Some rules failed verification: ${failed_rules%,}"
            exit 1
          fi
      
      - name: Comment PR (if applicable)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync(process.env.GITHUB_STEP_SUMMARY, 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## QED Prover Test Results\n\n${summary}`
            });
      
      - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          rules/*.json
          rules/*.result
          test-output-*.log