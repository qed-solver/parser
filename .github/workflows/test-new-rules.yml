name: Test All Rules

on:
  push:
    paths:
      - 'src/main/java/org/qed/Generated/RRuleInstances/**/*.java'
  pull_request:
    paths:
      - 'src/main/java/org/qed/Generated/RRuleInstances/**/*.java'

jobs:
  test-all-rules:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Build CVC5 from source with Java bindings
      - name: Build and Install CVC5
        run: |
          # Install build dependencies
          sudo apt-get update
          sudo apt-get install -y cmake libgmp-dev python3 python3-pip
          
          # Clone and build CVC5
          git clone https://github.com/cvc5/cvc5.git
          cd cvc5
          ./configure.sh --java-bindings --auto-download --prefix=$PWD/build/install
          cd build
          make -j$(nproc)
          make install
          
          # Find the built JAR file
          CVC5_JAR=$(find install/share/java -name "cvc5*.jar" | grep -v sources | head -1)
          echo "Found CVC5 JAR: $CVC5_JAR"
          
          # Install to Maven local repository
          mvn install:install-file \
            -Dfile="$CVC5_JAR" \
            -DgroupId=io.github.cvc5 \
            -DartifactId=cvc5 \
            -Dversion=1.2.1 \
            -Dpackaging=jar \
            -DgeneratePom=true

      - name: Build project
        run: mvn -B compile --file pom.xml

      - name: Generate JSON for all rules
        run: |
          mkdir -p tmp-rules

          # First, ensure all dependencies are downloaded
          mvn dependency:resolve

          cat > JsonGenerator.java << 'EOF'
          import org.qed.*;
          import com.fasterxml.jackson.databind.ObjectMapper;
          import com.fasterxml.jackson.databind.node.ObjectNode;
          import java.nio.file.*;
          public class JsonGenerator {
              public static void main(String[] args) throws Exception {
                  if (args.length == 0) {
                      System.err.println("Usage: java JsonGenerator <className>");
                      System.exit(1);
                  }
                  String className = args[0];
                  try {
                      Class<?> clazz = Class.forName(className);
                      RRule rule = (RRule) clazz.getDeclaredConstructor().newInstance();
                      ObjectMapper mapper = new ObjectMapper();
                      Files.createDirectories(Path.of("tmp-rules"));
                      String fileName = rule.name() + "-" + rule.info() + ".json";
                      
                      // Get the JSON object
                      ObjectNode jsonNode = rule.toJson();
                      
                      // Write to file
                      mapper.writerWithDefaultPrettyPrinter().writeValue(
                          Path.of("tmp-rules", fileName).toFile(),
                          jsonNode
                      );
                      System.out.println("Generated: " + fileName);
                  } catch (Exception e) {
                      System.err.println("Failed to generate JSON for " + className);
                      e.printStackTrace();
                      System.exit(1);
                  }
              }
          }
          EOF

          # Build the classpath more reliably
          echo "Building classpath..."
          MAVEN_CP=$(mvn dependency:build-classpath -Dmdep.outputFile=/dev/stdout -q)
          CLASSPATH="target/classes:${MAVEN_CP}"
          
          echo "Compiling JsonGenerator..."
          javac -cp "$CLASSPATH" JsonGenerator.java
          
          if [ $? -ne 0 ]; then
            echo "Failed to compile JsonGenerator.java"
            echo "Classpath was: $CLASSPATH"
            exit 1
          fi

          echo "Finding rule files..."
          find src/main/java/org/qed/Generated/RRuleInstances -name '*.java' | while read file; do
            className=$(echo "$file" | sed 's|src/main/java/||; s|/|.|g; s|\.java$||')
            echo "Generating JSON for: $className"
            java -cp ".:$CLASSPATH" JsonGenerator "$className" || echo "Failed to process $className"
          done

          rm -f JsonGenerator.java JsonGenerator.class
          
          # Check if any JSON files were generated
          if [ ! "$(ls -A tmp-rules)" ]; then
            echo "Error: No JSON files were generated!"
            exit 1
          fi
          
          echo "Generated $(ls -1 tmp-rules/*.json | wc -l) JSON files"

      - name: Install Rust and clone qed-prover
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git
          
          # Install Rust with nightly toolchain
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly
          source $HOME/.cargo/env
          
          # Verify we're using nightly
          rustc --version
          
          # Clone and build qed-prover
          git clone https://github.com/qed-solver/prover.git qed-prover
          cd qed-prover
          cargo +nightly build --release

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Test all rules
        run: |
          echo "## QED Prover Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          failed_rules=""
          passed_rules=""

          for json_file in tmp-rules/*.json; do
            rule_name=$(basename "$json_file" .json)
            echo "Testing $rule_name"
            output=$(./qed-prover/target/release/qed-prover "$json_file")
            if echo "$output" | jq -e '.provable == true' > /dev/null; then
              echo "✅ $rule_name: PASSED" | tee -a $GITHUB_STEP_SUMMARY
              passed_rules="$passed_rules$rule_name,"
            else
              echo "❌ $rule_name: FAILED" | tee -a $GITHUB_STEP_SUMMARY
              failed_rules="$failed_rules$rule_name,"
            fi
          done

          if [ -n "$failed_rules" ]; then
            echo "::error::Some rules failed: ${failed_rules%,}"
            exit 1
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rule-json
          path: tmp-rules/