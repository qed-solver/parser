name: Test All Rules

on:
  push:
    paths:
      - 'src/main/java/org/qed/Generated/RRuleInstances/**/*.java'
  pull_request:
    paths:
      - 'src/main/java/org/qed/Generated/RRuleInstances/**/*.java'

jobs:
  test-all-rules:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build project
        run: mvn -B compile --file pom.xml

      - name: Generate JSON for all rules
        run: |
          mkdir -p tmp-rules

          cat > JsonGenerator.java << 'EOF'
          import org.qed.*;
          import com.fasterxml.jackson.databind.ObjectMapper;
          import java.nio.file.*;
          public class JsonGenerator {
              public static void main(String[] args) throws Exception {
                  if (args.length == 0) {
                      System.err.println("Usage: java JsonGenerator <className>");
                      System.exit(1);
                  }
                  String className = args[0];
                  try {
                      Class<?> clazz = Class.forName(className);
                      RRule rule = (RRule) clazz.getDeclaredConstructor().newInstance();
                      ObjectMapper mapper = new ObjectMapper();
                      Files.createDirectories(Path.of("tmp-rules"));
                      String fileName = rule.name() + "-" + rule.info() + ".json";
                      mapper.writerWithDefaultPrettyPrinter().writeValue(
                          Path.of("tmp-rules", fileName).toFile(),
                          rule.toJson()
                      );
                      System.out.println("Generated: " + fileName);
                  } catch (Exception e) {
                      System.err.println("Failed to generate JSON for " + className);
                      e.printStackTrace();
                      System.exit(1);
                  }
              }
          }
          EOF

          CLASSPATH="target/classes:$(mvn dependency:build-classpath -q -DforceStdout)"
          javac -cp "$CLASSPATH" JsonGenerator.java

          find src/main/java/org/qed/Generated/RRuleInstances -name '*.java' | while read file; do
            className=$(echo "$file" | sed 's|src/main/java/||; s|/|.|g; s|\.java$||')
            echo "Generating for: $className"
            java -cp ".:$CLASSPATH" JsonGenerator "$className"
          done

          rm -f JsonGenerator.java JsonGenerator.class

      - name: Install Rust and clone qed-prover
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          git clone https://github.com/qed-solver/prover.git qed-prover
          cd qed-prover
          cargo build --release


      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Test all rules
        run: |
          echo "## QED Prover Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          failed_rules=""
          passed_rules=""

          for json_file in tmp-rules/*.json; do
            rule_name=$(basename "$json_file" .json)
            echo "Testing $rule_name"
            output=$(./qed-prover/target/release/qed-prover "$json_file")
            if echo "$output" | jq -e '.provable == true' > /dev/null; then
              echo "✅ $rule_name: PASSED" | tee -a $GITHUB_STEP_SUMMARY
              passed_rules="$passed_rules$rule_name,"
            else
              echo "❌ $rule_name: FAILED" | tee -a $GITHUB_STEP_SUMMARY
              failed_rules="$failed_rules$rule_name,"
            fi
          done

          if [ -n "$failed_rules" ]; then
            echo "::error::Some rules failed: ${failed_rules%,}"
            exit 1
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rule-json
          path: tmp-rules/
